name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # STAGE 1: The Matrix Compatibility Check
  test:
    name: Compatibility Check (Keycloak ${{ matrix.keycloak }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        keycloak: ["24.0.0", "25.0.6", "26.0.5"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Run tests against the specific matrix version
      - name: Run Tests
        run: mvn clean test -Dkeycloak.version=${{ matrix.keycloak }}

  # STAGE 2: The Universal Build & Release
  release:
    name: Build and Publish Universal JAR
    needs: test # ⚠️ CRITICAL: Wait for ALL matrix tests to pass first!
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build the production JAR against the lowest supported version
      - name: Build Universal JAR
        run: mvn clean package -DskipTests -Dkeycloak.version=24.0.0 -Drevision=${{ github.ref_name }}

      # Create the official Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/keycloak-profile-enricher-*.jar
          generate_release_notes: true